# WiFi402 PF anchor — scoped to bridge100 (macOS Internet Sharing interface)
# Only controls traffic FROM hotspot clients — never touches the Mac's own traffic.
#
# bridge100 is the virtual interface macOS creates when Internet Sharing is enabled.
# All devices that join "Rahul-WiFi" (or whatever the hotspot is named) get IPs
# on the 192.168.2.0/24 subnet and their traffic flows through bridge100.
#
# Rules:
#   1. Always allow DNS (port 53) so the portal page can load
#   2. Always allow access to this Mac on port 3000 (the captive portal itself)
#   3. Redirect HTTP (port 80) from unpaid clients → captive portal on port 3000
#   4. Block all other outbound traffic from unpaid clients
#   5. Pass everything from paid clients

table <paid_users> persist
table <hotspot_net> const { 192.168.2.0/24 }

# Rule 1: Redirect unpaid HTTP traffic → captive portal (port 3000)
# Translation rules must come before filter rules in PF
rdr pass on bridge100 inet proto tcp from <hotspot_net> to !<paid_users> port 80 -> 192.168.2.1 port 3000

# Rule 2: Always allow DNS from all hotspot clients so browser can resolve domains
pass in  on bridge100 proto udp from <hotspot_net> to any port 53
pass out on bridge100 proto udp from any to <hotspot_net> port 53
pass in  on bridge100 proto tcp from <hotspot_net> to any port 53
pass out on bridge100 proto tcp from any to <hotspot_net> port 53

# Rule 3: Always allow hotspot clients to reach this Mac on port 3000 (captive portal)
pass in  on bridge100 proto tcp from <hotspot_net> to 192.168.2.1 port 3000
pass out on bridge100 proto tcp from 192.168.2.1 port 3000 to <hotspot_net>

# Rule 4: Block all outbound internet traffic from unpaid hotspot clients
block out on bridge100 from <hotspot_net> to !<paid_users>

# Rule 5: Pass all traffic from paid clients
pass out on bridge100 from <paid_users> to any
